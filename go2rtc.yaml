api:
  listen: "127.0.0.1:1984"

ffmpeg:
  bin: "ffmpeg"
  h264:        "-vf scale=-2:480  -threads 4 -codec:v libx264 -preset ultrafast -tune zerolatency -crf 26"
  h264_480p:   "-vf scale=-2:480  -threads 4 -codec:v libx264 -preset ultrafast -tune zerolatency -crf 26"
  h264_720p:   "-vf scale=-2:720  -threads 4 -codec:v libx264 -preset ultrafast -tune zerolatency -crf 24"
  h264_1080p:  "-vf scale=-2:1080 -threads 4 -codec:v libx264 -preset ultrafast -tune zerolatency -crf 22"
  h264_native: "-threads 4 -codec:v libx264 -preset ultrafast -tune zerolatency -crf 20"

webrtc:
  ice_servers:
    - urls: [stun:stun.l.google.com:19302]

log:
  level: info
